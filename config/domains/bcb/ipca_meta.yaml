# Meta para a inflação
# Unidade: %
extract:
  extractors:
    - type: sgs
      params:
        periodicidade_diaria: false
        request:
          url: "https://api.bcb.gov.br/dados/serie/bcdata.sgs.13521/dados"
          query_params:
            formato: "json"
            dataInicial: "01/01/1998" # Data Inicial segundo metadados do SGS: 01/01/1999
            dataFinal: "31/12/2025"
transform:
  transformers:
    - type: json_to_dataframe
      params: {}
    - type: text_to_date
      params:
        target_column: data
        text_format: "%d/%m/%Y"
    - type: percent_to_decimal
      params:
        target_column: valor
        result_column: ipca_meta
    - type: select_columns
      params:
        columns:
          - data
          - ipca_meta
load:
  partition_by: []