extract:
  base_url: "https://www.bcb.gov.br/api/servico/sitebcb/copom"
  endpoints:
    list: "comunicados"
    detail: "comunicados_detalhes"
  params: { quantidade: 40 } # 5 anos de reunioes (8 reunioes por ano)
transform:
  transformers:
    - type: json_to_dataframe
      params: {}
    - type: rename_columns
      params:
        columns_mapping:
          dataReferencia: data_referencia
          textoComunicado: html_comunicado
    - type: html_to_text
      params:
        target_column: html_comunicado
        result_column: conteudo
    - type: select_columns
      params:
        columns:
          - nro_reuniao
          - data_referencia
          - titulo
          - conteudo
load:
  partition_by: []